<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лабораторна робота Guf Edition</title>

    <link rel="icon" type="image/png" href="favicon.png">

    <style>
        /* Глобальні стилі та фон */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #000000 5%, #D2042D 95%);
            color: white;
            text-align: center;
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 40px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        /* Контейнер для трьох карток */
        .cards-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 50px;
            flex-wrap: wrap;
        }

        /* Стилі для самих карток (Glassmorphism) */
        .card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 20px;
            width: 220px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card h2 {
            font-size: 18px;
            margin-top: 0;
            margin-bottom: 15px;
        }

        /* Загальні стилі для зображень у картках */
        .card img, .card svg {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border-radius: 8px;
            background-color: white; /* Фон під SVG */
        }

        /* * АНІМАЦІЯ ВЕРЧЕННЯ
         */
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Робимо фото в другій картці круглим і додаємо анімацію */
        .card img.circle-img {
            border-radius: 50%;
            /* Анімація: назва(spin), час(8 секунд), рівномірно(linear), нескінченно(infinite) */
            animation: spin 8s linear infinite;
        }

        /* Стилі для секцій (Фотоколаж, Мем) */
        .section {
            margin-bottom: 50px;
        }

        .section h3 {
            font-size: 20px;
            margin-bottom: 20px;
        }

        /* Фотоколаж */
        .collage {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .collage img {
            width: 240px;
            height: 140px;
            object-fit: cover;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        /* Великий мем */
        .meme-img {
            max-width: 100%;
            width: 500px;
            height: auto;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        /* Кнопка */
        button {
            padding: 12px 24px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background-color: white;
            color: #333;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: all 0.2s ease;
        }

        button:hover {
            background-color: #f0f0f0;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }

        button:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

<h1>Лабораторна робота Guf Edition</h1>

<div class="cards-container">
    <div class="card">
        <h2>PNG логотип</h2>
        <img src="guf.png" alt="Гуф логотип">
    </div>

    <div class="card">
        <h2>SVG файл</h2>
        <img src="guf.png" alt="Гуф коло" class="circle-img">
    </div>

    <div class="card">
        <h2>SVG inline</h2>
        <svg id="inline-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <rect width="100" height="100" fill="green" />
        </svg>
    </div>
</div>

<div class="section">
    <h3>📸 Фотоколаж</h3>
    <div class="collage">
        <img src="guf.png" alt="Колаж 1" style="object-position: top;">
        <img src="guf2.png" alt="Колаж 2" style="object-position: center;">
        <img src="guf3.png" alt="Колаж 3" style="object-position: bottom;">
    </div>
</div>

<div class="section">
    <h3>😂 Мем</h3>
    <img src="GufTrojan.png" alt="Гуф Мем" class="meme-img">
</div>

<button id="color-btn">Змінити колір SVG</button>

<script>
    const btn = document.getElementById('color-btn');
    const svgRect = document.querySelector('#inline-svg rect');

    btn.addEventListener('click', function() {
        const randomColor = '#' + Math.floor(Math.random() * 16777215).toString(16).padStart(6, '0');
        svgRect.setAttribute('fill', randomColor);
    });
</script>

</body>
</html>
